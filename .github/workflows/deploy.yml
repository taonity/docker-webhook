name: Deploy

on:
  workflow_call:
    inputs:
      project_name:
        description: 'The project (image) name to deploy (without owner prefix)'
        required: true
        type: string
      environment:
        description: 'Target environment (e.g. stage, prod)'
        required: false
        type: string
        default: 'stage'
    secrets:
      WEBHOOK_URL:
        description: 'Base URL of webhook server (e.g. https://myserver.com:9000)'
        required: true
      WEBHOOK_SECRET:
        description: 'Webhook secret used in the URL path'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment of ${{ inputs.project_name }} to ${{ inputs.environment }}
        run: |
          echo "Deploying project [${{ inputs.project_name }}] to [${{ inputs.environment }}]"
          echo "---"

          response_body_file="$(mktemp)"
          trap 'rm -f "$response_body_file"' EXIT

          curl_exit=0
          http_code=$(curl --no-buffer --silent --show-error --max-time 600 \
            --output "$response_body_file" \
            --write-out "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "push_data": { "tag": "latest" },
              "repository": { "name": "${{ inputs.project_name }}" },
              "environment": "${{ inputs.environment }}"
            }' \
            "${{ secrets.WEBHOOK_URL }}/hooks/${{ secrets.WEBHOOK_SECRET }}/docker-webhook") || curl_exit=$?

          echo "HTTP status: ${http_code:-N/A}"
          echo "--- Response body ---"
          cat "$response_body_file"
          echo ""

          if [ "$curl_exit" -ne 0 ]; then
            echo "--- Deployment request failed due to network/transport error ---"
            exit "$curl_exit"
          fi

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "--- Deployment failed ---"
            exit 1
          fi

          echo "--- Deployment completed successfully ---"
